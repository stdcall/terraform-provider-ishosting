name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      # Provide Terraform on PATH so tfplugindocs uses it instead of downloading
      # the binary itself (which fails verification when HashiCorp's embedded
      # release GPG key has expired: "openpgp: key expired").
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Generate docs
        run: go generate ./...

      - name: Check for uncommitted docs changes
        run: |
          git diff --compact-summary --exit-code docs/ || \
            (echo "::error::Generated docs are out of date. Run 'go generate ./...' and commit the result." && exit 1)
